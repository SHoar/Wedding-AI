services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: wedding_ai_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wedding_ai_development"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ai-service:
    build:
      context: ./ai_service
    volumes:
      - ./docs:/app/docs
      - chroma_data:/app/data
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5-nano}
      OPENAI_SUMMARIZATION_MODEL: ${OPENAI_SUMMARIZATION_MODEL:-}
      OPENAI_QA_MODEL: ${OPENAI_QA_MODEL:-}
      AI_HTTP_TIMEOUT: ${AI_HTTP_TIMEOUT:-45}
      DOCS_DIR: /app/docs
      CHROMA_PERSIST_DIR: /app/data/chroma
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAG_CACHE_TTL_SECONDS: ${RAG_CACHE_TTL_SECONDS:-300}
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_NAME: wedding_ai_development
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://localhost:8080}
      AI_SERVICE_URL: http://ai-service:8000
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      RAILS_ENV: development
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"

  prometheus:
    image: prom/prometheus:v2.52.0
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    depends_on:
      - ai-service

  wedding-dashboard-frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_DEFAULT_WEDDING_ID: ${VITE_DEFAULT_WEDDING_ID:-1}
    environment:
      VITE_API_PROXY_TARGET: http://backend:3000
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  chroma_data:
